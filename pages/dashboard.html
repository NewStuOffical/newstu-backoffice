<!DOCTYPE html>
<html lang="en">

<head>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/dashboard.css">
    
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Dashboard title -->
    <title>NewStu OS Dashboard</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Dashboard-specific stylesheet -->
    <link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

    <!-- ==========================
         SIDEBAR
    =========================== -->

    <aside class="sidebar">

        <h2>🎙 NewStu OS</h2>

        <ul>

            <li>Dashboard</li>

            <li>Merch Lab</li>

            <li>Products</li>

            <li>Marketing</li>

            <li>Vendors</li>

            <li>Contracts</li>

            <li>Revenue</li>

            <li>Accounting</li>

            <li>CRM</li>

            <li>Reports</li>

            <li>Settings</li>

        </ul>

    </aside>

    <!-- ==========================
         MAIN CONTENT
    =========================== -->

    <main class="main-content">

        <!-- Header -->

        <header>

            <h1>Dashboard</h1>

            <p>Welcome to NewStu Operating System</p>

        </header>

        <!-- Dashboard Cards -->

        <section class="cards">

            <div class="card">

                <h3>Revenue</h3>

                <p>$0.00</p>

            </div>

            <div class="card">

                <h3>Orders</h3>

                <p>0</p>

            </div>

            <div class="card">

                <h3>Bookings</h3>

                <p>0</p>

            </div>

            <div class="card">

                <h3>Artists</h3>

                <p>0</p>

            </div>

        </section>

        <!-- Quick Actions -->

        <section class="panel">

            <h2>Quick Actions</h2>

            <button>New Product</button>

            <button>Book Session</button>

            <button>Request Sample</button>

            <button>Create Campaign</button>

        </section>

    </main>

</body>

</html>
